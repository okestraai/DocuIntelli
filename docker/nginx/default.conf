# ─── Mobile User-Agent Detection ────────────────────────────
# Detects mobile browsers to serve the Expo Web build instead of the desktop React build.
# Bots/crawlers are excluded so they always get the desktop build (for SEO).

map $http_user_agent $is_mobile {
    default 0;
    "~*android"        1;
    "~*iphone"         1;
    "~*ipad"           1;
    "~*ipod"           1;
    "~*windows phone"  1;
    "~*mobile"         1;
}

map $http_user_agent $is_bot {
    default 0;
    "~*googlebot"              1;
    "~*bingbot"                1;
    "~*slurp"                  1;
    "~*duckduckbot"            1;
    "~*baiduspider"            1;
    "~*yandexbot"              1;
    "~*facebookexternalhit"    1;
    "~*twitterbot"             1;
    "~*linkedinbot"            1;
    "~*whatsapp"               1;
    "~*telegrambot"            1;
    "~*slackbot"               1;
    "~*discordbot"             1;
}

# Combine: serve mobile only if UA is mobile AND not a bot AND no desktop override cookie
map "$is_mobile:$is_bot:$cookie_prefer_desktop" $serve_mobile {
    default         0;
    "1:0:"          1;   # Mobile UA, not a bot, no desktop cookie
}


# ─── Health check + HTTP redirect ──────────────────────────
server {
    listen 80;
    server_name docuintelli.com www.docuintelli.com;

    # Health check (returns 200 for Docker health probes)
    location /nginx-health {
        access_log off;
        return 200 "ok";
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://docuintelli.com$request_uri;
    }
}

# Redirect app.docuintelli.com on port 80
server {
    listen 80;
    server_name app.docuintelli.com;
    return 301 https://docuintelli.com$request_uri;
}

# Redirect app.docuintelli.com → docuintelli.com
server {
    listen 443;
    server_name app.docuintelli.com;
    return 301 https://docuintelli.com$request_uri;
}

# Redirect www → non-www (canonical domain)
server {
    listen 443;
    server_name www.docuintelli.com;
    return 301 https://docuintelli.com$request_uri;
}

# Redirect m.docuintelli.com → docuintelli.com
# Mobile routing is now handled via UA detection on the main domain.
server {
    listen 443;
    server_name m.docuintelli.com;
    return 301 https://docuintelli.com$request_uri;
}


# ─── Main app server ───────────────────────────────────────
# Cloudflare Tunnel sends plain HTTP to localhost:443; Cloudflare Edge handles SSL termination.
server {
    listen 443;
    server_name docuintelli.com;

    # Security headers (supplements Express helmet)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Request size limit (matches Express 10mb body limit + overhead)
    client_max_body_size 12m;

    # ── API routes → always Express (regardless of UA) ──
    location /api/ {
        proxy_pass http://web:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Desktop static assets (Vite content-hashed filenames) ──
    location /assets/ {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Expo Web static assets (content-hashed) ──
    location /_expo/ {
        root /app/dist-mobile;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SEO files — cache at edge for 1 hour ──
    location = /robots.txt {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public";
    }

    location = /sitemap.xml {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── OG images — cache for 30 days ──
    location /og/ {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Mobile web SPA (Expo Web build) ──
    # Internal location served directly by nginx from the shared volume.
    # Handles SPA routing: try the exact file, then fall back to index.html.
    location ^~ /--mobile-- {
        internal;
        alias /app/dist-mobile/;
        index index.html;
        try_files $uri $uri.html /index.html;
    }

    # ── Catch-all: route by User-Agent ──
    location / {
        # Mobile UA (non-bot, no desktop cookie) → internal rewrite to mobile SPA
        if ($serve_mobile) {
            rewrite ^(.*)$ /--mobile--$1 last;
        }

        # Desktop / bot → Express with SEO meta injection
        proxy_pass http://web:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Prevent Cloudflare and browsers from caching HTML pages
        # (JS/CSS assets have content-hashed filenames so they're safe to cache long-term)
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }
}
